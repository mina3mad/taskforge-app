version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-mina1234}
      POSTGRES_DB: ${DB_NAME:-TaskForgeDB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_NAME:-TaskForgeDB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USERNAME=${DB_USERNAME:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-mina1234}
      - DB_NAME=${DB_NAME:-TaskForgeDB}
      - PORT=3001
      - JWT_SECRET=${JWT_SECRET:-helloworld}
      - JWT_EXPIRATION=${JWT_EXPIRATION:-3600}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-helloworld2}
      - JWT_REFRESH_EXPIRATION=${JWT_REFRESH_EXPIRATION:-604800}
      - BACKEND_URL=http://localhost:3001/
      - NODE_ENV=development
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-http://localhost:3001/api}
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  postgres_data:
